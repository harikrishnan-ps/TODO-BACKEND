apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: hariacr2026xyz.azurecr.io/product-api:latest
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Development
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: ConnectionStrings__DefaultConnection
          value: Server=todo-mysql-db;Port=3306;Database=todo_db;User=root;Password=root;
        - name: Jwt__Secret
          value: this_is_a_super_secret_key_for_jwt_which_must_be_long_enough_256bits_plus
        - name: Jwt__Issuer
          value: TodoApp
        - name: Jwt__Audience
          value: TodoAppUsers
        - name: RUN_MIGRATIONS
          value: "true"
        - name: ENABLE_SWAGGER
          value: "true"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
spec:
  ports:
  - port: 8080
  selector:
    app: api
